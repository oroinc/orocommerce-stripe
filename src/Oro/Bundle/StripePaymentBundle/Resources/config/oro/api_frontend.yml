api:
    entities:
        Oro\Bundle\CheckoutBundle\Entity\Checkout:
            documentation_resource: '@OroStripePaymentBundle/Resources/doc/api_frontend/checkout.md'
            subresources:
                paymentInfoStripePaymentElement:
                    target_class: Oro\Bundle\CheckoutBundle\Entity\Checkout
                    actions:
                        add_subresource:
                            description: Add to the checkout the data required to create a Stripe Payment Intent.
                            request_target_class: Oro\Bundle\StripePaymentBundle\Api\Model\StripePaymentElementPaymentInfoRequest
                        get_subresource: false
                paymentStripePaymentElement:
                    target_class: Oro\Bundle\OrderBundle\Entity\Order
                    actions:
                        add_subresource:
                            description: Create a Stripe Payment Intent for the checkout.
                            request_target_class: Oro\Bundle\StripePaymentBundle\Api\Model\StripePaymentElementPaymentRequest
                        get_subresource: false
        
        Oro\Bundle\StripePaymentBundle\Api\Model\StripePaymentElementPaymentInfoRequest:
            documentation_resource: '@OroStripePaymentBundle/Resources/doc/api_frontend/checkout.md'
            fields:
                confirmationTokenId:
                    data_type: string
                    form_options:
                        constraints:
                            -   NotBlank: ~
                paymentMethodType:
                    data_type: string
                    form_options:
                        constraints:
                            -   NotBlank: ~
            # This entity does not have own API resource.
            actions: false

        Oro\Bundle\StripePaymentBundle\Api\Model\StripePaymentElementPaymentRequest:
            documentation_resource: '@OroStripePaymentBundle/Resources/doc/api_frontend/checkout.md'
            fields:
                successUrl:
                    data_type: string
                    form_options:
                        constraints:
                            -   NotBlank: ~
                failureUrl:
                    data_type: string
                    form_options:
                        constraints:
                            -   NotBlank: ~
                partiallyPaidUrl:
                    data_type: string
                    form_options:
                        constraints:
                            -   NotBlank: ~
            # This entity does not have own API resource.
            actions: false
