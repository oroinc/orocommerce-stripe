services:

    oro_stripe_payment.stripe_payment_intent.executor:
        class: 'Oro\Bundle\StripePaymentBundle\StripePaymentIntent\Executor\StripePaymentIntentActionExecutorComposite'
        arguments:
            - !tagged_iterator { tag: 'oro_stripe_payment.stripe_payment_intent.executor' }

    oro_stripe_payment.stripe_payment_intent.executor.authorize:
        class: 'Oro\Bundle\StripePaymentBundle\StripePaymentIntent\Executor\AuthorizeStripeActionExecutor'
        arguments:
            - '@oro_stripe_payment.stripe_client.factory'
            - '@oro_stripe_payment.stripe_customer.executor'
            - '@oro_stripe_payment.stripe_amount_converter'
            - '@router'
            - '@event_dispatcher'
        calls:
            - ['setLogger', ['@logger']]
        tags:
            - { name: 'oro_stripe_payment.stripe_payment_intent.executor' }
            - { name: 'monolog.logger', channel: 'oro_stripe_payment_element' }

    oro_stripe_payment.stripe_payment_intent.executor.charge:
        class: 'Oro\Bundle\StripePaymentBundle\StripePaymentIntent\Executor\ChargeStripeActionExecutor'
        arguments:
            - '@oro_stripe_payment.stripe_client.factory'
            - '@oro_stripe_payment.stripe_customer.executor'
            - '@oro_stripe_payment.stripe_amount_converter'
            - '@router'
            - '@event_dispatcher'
        calls:
            - ['setLogger', ['@logger']]
        tags:
            - { name: 'oro_stripe_payment.stripe_payment_intent.executor' }
            - { name: 'monolog.logger', channel: 'oro_stripe_payment_element' }

    oro_stripe_payment.stripe_payment_intent.executor.purchase_suborders_aware:
        class: 'Oro\Bundle\StripePaymentBundle\StripePaymentIntent\Executor\PurchaseSubOrdersAwareStripeActionExecutor'
        arguments:
            - '@oro_stripe_payment.stripe_payment_intent.executor'
            - '@oro_stripe_payment.provider.sub_orders_by_payment_transaction'
            - '@oro_stripe_payment.factory.sub_order_payment_transaction'
            - '@oro_payment.provider.payment_transaction'
        calls:
            - ['setLogger', ['@logger']]
        tags:
            - name: 'oro_stripe_payment.stripe_payment_intent.executor'
              # Must be executed before the oro_stripe_payment.stripe_payment_intent.executor.charge
              priority: 100
            - { name: 'monolog.logger', channel: 'oro_stripe_payment_element' }

    oro_stripe_payment.stripe_payment_intent.executor.charge_off_session:
        class: 'Oro\Bundle\StripePaymentBundle\StripePaymentIntent\Executor\ChargeOffSessionStripeActionExecutor'
        arguments:
            - '@oro_stripe_payment.stripe_client.factory'
            - '@oro_stripe_payment.stripe_customer.executor'
            - '@oro_stripe_payment.stripe_amount_converter'
            - '@event_dispatcher'
        calls:
            - ['setLogger', ['@logger']]
        tags:
            - name: 'oro_stripe_payment.stripe_payment_intent.executor'
              # Must be executed before the oro_stripe_payment.stripe_payment_intent.executor.charge
              priority: 100
            - { name: 'monolog.logger', channel: 'oro_stripe_payment_element' }

    oro_stripe_payment.stripe_payment_intent.executor.authorize_off_session:
        class: 'Oro\Bundle\StripePaymentBundle\StripePaymentIntent\Executor\AuthorizeOffSessionStripeActionExecutor'
        arguments:
            - '@oro_stripe_payment.stripe_client.factory'
            - '@oro_stripe_payment.stripe_customer.executor'
            - '@oro_stripe_payment.stripe_amount_converter'
            - '@event_dispatcher'
        calls:
            - ['setLogger', ['@logger']]
        tags:
            - name: 'oro_stripe_payment.stripe_payment_intent.executor'
              # Must be executed before the oro_stripe_payment.stripe_payment_intent.executor.authorize
              priority: 100
            - { name: 'monolog.logger', channel: 'oro_stripe_payment_element' }

    oro_stripe_payment.stripe_payment_intent.executor.re_authorize:
        class: 'Oro\Bundle\StripePaymentBundle\StripePaymentIntent\Executor\ReAuthorizeStripeActionExecutor'
        arguments:
            - '@oro_stripe_payment.stripe_client.factory'
            - '@oro_payment.provider.payment_transaction'
            - '@oro_stripe_payment.stripe_payment_intent.executor.cancel'
            - '@oro_stripe_payment.stripe_amount_converter'
            - '@event_dispatcher'
        calls:
            - ['setLogger', ['@logger']]
        tags:
            - { name: 'oro_stripe_payment.stripe_payment_intent.executor' }
            - { name: 'monolog.logger', channel: 'oro_stripe_payment_element' }

    oro_stripe_payment.stripe_payment_intent.executor.capture:
