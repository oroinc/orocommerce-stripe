    oro_stripe_payment.stripe_payment_intent.executor.webhook.payment_intent_canceled:
        class: 'Oro\Bundle\StripePaymentBundle\StripePaymentIntent\Executor\Webhook\PaymentIntentCanceledStripeActionExecutor'
        arguments:
